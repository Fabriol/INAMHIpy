{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-lg mt-5">
            <div class="card-header text-center bg-white border-0 pt-4">
                <h3 class="font-weight-light my-2 fw-bold" style="color: #003366;">Sistema Paz y Salvo</h3>
                <p class="text-muted">Acceso Restringido</p>
            </div>
            <div class="card-body px-5 pb-5">
                <form method="POST" action="/login">
                    
                    <div class="form-floating mb-3">
                        <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required />
                        <label for="email">Correo Institucional</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input class="form-control" id="password" name="password" type="password" placeholder="Contraseña" required />
                        <label for="password">Contraseña</label>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg" style="background-color: #003366; border: none;" type="submit">Ingresar al Sistema</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
