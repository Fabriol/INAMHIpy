{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 550px; border-radius: 24px; overflow: hidden;">
        <div class="card-header bg-primary text-white p-4"
            style="background: linear-gradient(135deg, #1e3a8a, #3b82f6) !important;">
            <div class="d-flex align-items-center gap-3">
                <div class="bg-white text-primary rounded-circle d-flex justify-content-center align-items-center"
                    style="width: 48px; height: 48px; font-size: 24px; font-weight: bold;">
                    <i class="bi bi-file-earmark-plus"></i>
                </div>
                <div>
                    <h4 class="mb-0 fw-bold">Nuevo Paz y Salvo</h4>
                    <p class="mb-0 small text-white-50">Ingrese los datos iniciales del ex funcionario</p>
                </div>
            </div>
        </div>

        <div class="card-body p-4 p-md-5">
            <form action="/paz-salvo/nueva" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary small text-uppercase">C챕dula de Identidad <span
                            class="text-danger">*</span></label>
                    <input type="text" name="cedula" class="form-control form-control-lg bg-light"
                        placeholder="Ej: 1712345678" maxlength="10" required pattern="\d{10}"
                        title="Debe contener exactamente 10 d챠gitos num챕ricos"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>

                <div class="row mb-4">
                    <div class="col-6">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Nombres <span
                                class="text-danger">*</span></label>
                        <input type="text" name="nombres" class="form-control form-control-lg bg-light"
                            placeholder="Dos nombres" required
                            oninput="this.value = this.value.replace(/[^A-Za-z횁횋횒횙횣찼챕챠처첬횗챰\s]/g, '').toUpperCase();">
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Apellidos <span
                                class="text-danger">*</span></label>
                        <input type="text" name="apellidos" class="form-control form-control-lg bg-light"
                            placeholder="Dos apellidos" required
                            oninput="this.value = this.value.replace(/[^A-Za-z횁횋횒횙횣찼챕챠처첬횗챰\s]/g, '').toUpperCase();">
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold text-secondary small text-uppercase">Correo Personal</label>
                    <input type="email" name="email" class="form-control form-control-lg bg-light"
                        placeholder="ejemplo@gmail.com" oninput="this.value = this.value.toLowerCase();">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold" style="border-radius: 12px;">Crear
                        Expediente e Iniciar</button>
                    <a href="/dashboard" class="btn btn-light fw-bold text-secondary"
                        style="border-radius: 12px;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
