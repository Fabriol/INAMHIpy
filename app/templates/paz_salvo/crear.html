{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h3 class="fw-bold" style="color: #003366;">Iniciar Trámite de Paz y Salvo</h3>
                <p class="text-muted">Ingrese los datos del servidor saliente. Esto le generará credenciales automáticas.</p>
            </div>
            <div class="card-body p-4">
                
                <form method="POST" action="/paz-salvo/nueva">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Cédula de Identidad</label>
                            <input type="text" class="form-control" name="cedula" 
                                   pattern="\d{10}" title="Debe ingresar exactamente 10 dígitos numéricos" 
                                   placeholder="Ej: 1712345678" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Correo Electrónico</label>
                            <input type="email" class="form-control" name="email" 
                                   placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Nombres Completos</label>
                            <input type="text" class="form-control" name="nombres" required>
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Apellidos Completos</label>
                            <input type="text" class="form-control" name="apellidos" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/dashboard" class="btn btn-outline-secondary">Cancelar y Volver</a>
                        <button type="submit" class="btn btn-success fw-bold px-4">Crear Trámite e Informar</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
