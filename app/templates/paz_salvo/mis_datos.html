{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h3 class="fw-bold" style="color: #003366;">Mis Datos Personales</h3>
                <p class="text-muted">Por favor, complete su información de contacto. Todos los campos son obligatorios.</p>
            </div>
            <div class="card-body p-4">
                
                <form method="POST" action="/mis-datos">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Teléfono Celular</label>
                            <input type="text" class="form-control" name="celular" 
                                   pattern="^09\d{8}$" title="Debe iniciar con 09 y tener 10 dígitos en total" 
                                   placeholder="Ej: 0912345678" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Teléfono Convencional</label>
                            <input type="text" class="form-control" name="convencional" 
                                   pattern="^02\d{7}$" title="Debe iniciar con 02 y tener 9 dígitos en total" 
                                   placeholder="Ej: 022345678" required>
                        </div>
                    </div>

                    <div class="row mt-2">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Provincia</label>
                            <select class="form-select" name="provincia" 
                                    hx-get="/api/cantones" 
                                    hx-target="#canton_select" 
                                    hx-trigger="change" required>
                                <option value="">Seleccione su provincia...</option>
                                <option value="Pichincha">Pichincha</option>
                                <option value="Guayas">Guayas</option>
                                <option value="Azuay">Azuay</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Cantón</label>
                            <select class="form-select" name="canton" id="canton_select" required>
                                <option value="">Primero seleccione una provincia</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-primary fw-bold px-4" style="background-color: #003366;">
                            Guardar y Enviar a Áreas
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
