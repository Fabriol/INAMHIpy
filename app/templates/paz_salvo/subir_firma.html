{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7">
        <div class="card shadow-lg border-0 rounded-3">
            <div class="card-header text-white pt-4 pb-3" style="background-color: #003366;">
                <h4 class="fw-bold text-center mb-0">Carga de Documento Firmado</h4>
            </div>
            <div class="card-body p-5 text-center">
                
                <div class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="#198754" class="bi bi-shield-check mb-3" viewBox="0 0 16 16">
                        <path d="M5.338 1.59a61 61 0 0 0-2.837.856.48.48 0 0 0-.328.39c-.554 4.157.726 7.19 2.253 9.188a10.7 10.7 0 0 0 2.287 2.233c.346.244.652.42.893.533q.18.085.293.118a1 1 0 0 0 .746 0q.114-.034.294-.118c.24-.113.547-.29.893-.533a10.7 10.7 0 0 0 2.287-2.233c1.527-1.997 2.807-5.031 2.253-9.188a.48.48 0 0 0-.328-.39c-.651-.213-1.75-.56-2.837-.855C9.552 1.29 8.531 1.067 8 1.067c-.53 0-1.552.223-2.662.524zM5.072.56C6.157.265 7.31 0 8 0s1.843.265 2.928.56c1.11.3 2.229.655 2.887.87a1.54 1.54 0 0 1 1.044 1.262c.596 4.477-.787 7.795-2.465 9.99a11.8 11.8 0 0 1-2.517 2.453 7 7 0 0 1-1.048.625c-.28.132-.581.24-.829.24s-.548-.108-.829-.24a7 7 0 0 1-1.048-.625 11.8 11.8 0 0 1-2.517-2.453C1.928 10.487.545 7.169 1.141 2.692A1.54 1.54 0 0 1 2.185 1.43 63 63 0 0 1 5.072.56"/>
                        <path d="M10.854 5.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 7.793l2.646-2.647a.5.5 0 0 1 .708 0"/>
                    </svg>
                    <h5 class="fw-bold">Validación Estricta FirmaEC</h5>
                    <p class="text-muted small">El sistema analizará matemáticamente la integridad de su certificado digital estándar. No suba documentos con imágenes escaneadas.</p>
                </div>

                <form method="POST" action="/paz-salvo/subir-firma/{{ solicitud.id }}" enctype="multipart/form-data">
                    <div class="mb-4 text-start">
                        <label for="pdf_firmado" class="form-label fw-bold">Seleccione el archivo PDF firmado:</label>
                        <input class="form-control form-control-lg border-primary" type="file" id="pdf_firmado" name="pdf_firmado" accept="application/pdf" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg fw-bold">Validar Firma y Finalizar Trámite</button>
                        <a href="/dashboard" class="btn btn-outline-secondary mt-2">Volver al Panel</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
